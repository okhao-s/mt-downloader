services:
  mt-downloader:
    image: okhao/mt:${MT_IMAGE_TAG:-latest}
    container_name: mt-downloader
    ports:
      - "9151:8080"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - WECOM_FORWARD_URL=${WECOM_FORWARD_URL:-}
      - WECOM_FORWARD_TOKEN=${WECOM_FORWARD_TOKEN:-}
    volumes:
      - /root/docker/video:/downloads
      - ./data:/app/data
    restart: unless-stopped
